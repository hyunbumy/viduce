<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viduce Broadcast</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem 1rem;
        background: #15171c;
        color: #e8eaed;
      }
      header { text-align: center; }
      header p { margin: 0.25rem 0 0; color: #9aa0a6; font-size: 0.9rem; }

      .preview-wrap { position: relative; width: 320px; height: 240px; }
      #preview {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        background: #000;
        border: 2px solid #303236;
        border-radius: 8px;
        object-fit: contain;
      }
      /* Red border while actually broadcasting. */
      #preview.live { border-color: #f2453d; }

      /* Status badge over the preview: "Preview" (idle) vs "● LIVE" (broadcasting). */
      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        background: #3c4043;
        color: #cdd0d4;
      }
      .badge.live { background: #f2453d; color: #fff; }

      .config {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 320px;
      }
      .config label {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.8rem;
        color: #9aa0a6;
      }
      .config input {
        padding: 0.4rem 0.6rem;
        font-size: 0.9rem;
        border: 1px solid #3c4043;
        border-radius: 6px;
        background: #1d1f24;
        color: #e8eaed;
      }
      .config input:disabled { opacity: 0.5; }

      .controls { display: flex; gap: 0.75rem; }
      button {
        padding: 0.5rem 1.25rem;
        font-size: 1rem;
        border: 1px solid #3c4043;
        border-radius: 6px;
        background: #2a2d31;
        color: #e8eaed;
        cursor: pointer;
      }
      /* The broadcast CTA is red — it sends your feed to the network. */
      button#start:not(:disabled) { background: #f2453d; border-color: #f2453d; color: #fff; }
      button:hover:not(:disabled) { filter: brightness(1.1); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }

      #status {
        min-height: 1.25rem;
        font-size: 0.9rem;
        color: #9aa0a6;
      }
      #status.error { color: #f28b82; }
    </style>
  </head>
  <body>
    <header>
      <h1>Viduce Broadcast</h1>
      <p>Webcam &rarr; 240&times;240 &rarr; MoQ relay</p>
    </header>

    <div class="preview-wrap">
      <video id="preview" muted autoplay playsinline></video>
      <span id="live-badge" class="badge">Preview</span>
    </div>

    <div class="config">
      <label>
        Relay URL
        <input id="relay-url" type="text" value="http://localhost:4443"
               autocomplete="off" spellcheck="false" />
      </label>
      <label>
        Broadcast name
        <input id="broadcast-name" type="text" value="viduce/cam"
               autocomplete="off" spellcheck="false" />
      </label>
    </div>

    <div class="controls">
      <button id="start" disabled>Start broadcast</button>
      <button id="stop" disabled>Stop broadcast</button>
    </div>

    <div id="status" role="status" aria-live="polite">Idle</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
